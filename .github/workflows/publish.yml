name: Build & Publish Wheels

# Triggers:
#   - Push a version tag (v0.1.1, v1.0.0, …) → build + publish to PyPI
#   - Manual dispatch                          → build only (no publish)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI?"
        required: false
        default: "false"

jobs:
  # ---------------------------------------------------------------------------
  # Build wheels: Linux + Windows, Python 3.10–3.13, CUDA 12.4
  # ---------------------------------------------------------------------------
  build-wheels:
    name: ${{ matrix.os }} · Python ${{ matrix.python }} · CUDA ${{ matrix.cuda }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:     [ubuntu-22.04, windows-2022]
        python: ["3.10", "3.11", "3.12", "3.13"]
        cuda:   ["12.4.1"]

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout (with submodules so cuda/ source is present)
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # -----------------------------------------------------------------------
      # 3. Install CUDA Toolkit
      # -----------------------------------------------------------------------
      - name: Install CUDA Toolkit (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Install CUDA dev headers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y libcusparse-dev-12-4 libcublas-dev-12-4

      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas_dev", "cusparse_dev"]'

      # -----------------------------------------------------------------------
      # 4. Install build dependencies
      # -----------------------------------------------------------------------
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu124
          pip install setuptools wheel ninja

      # -----------------------------------------------------------------------
      # 5. Build the wheel
      #    TORCH_CUDA_ARCH_LIST covers SM75–SM120 (all GPUs we support)
      #    CUDA_BUILD_REQUIRED=1  → setup.py fails loudly if nvcc/cl missing
      # -----------------------------------------------------------------------
      - name: Build wheel (Linux)
        if: runner.os == 'Linux'
        env:
          # SM120 (Blackwell) requires CUDA 12.8+; CI uses 12.4 so exclude it.
          # Blackwell users get PTX JIT from SM90 which works correctly at runtime.
          TORCH_CUDA_ARCH_LIST: "7.5 8.0 8.6 8.9 9.0"
          MAX_JOBS: "4"
          CUDA_BUILD_REQUIRED: "1"
          VERBOSE: "1"
        # --no-build-isolation: reuse the current env (torch already installed above)
        run: pip wheel . --no-deps --no-build-isolation -w dist/ 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        env:
          TORCH_CUDA_ARCH_LIST: "7.5 8.0 8.6 8.9 9.0"
          MAX_JOBS: "4"
          CUDA_BUILD_REQUIRED: "1"
        shell: cmd
        # vcvars64.bat puts cl.exe on PATH; we then pipe the pip wheel call through it
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          pip wheel . --no-deps --no-build-isolation -w dist/

      # -----------------------------------------------------------------------
      # 6. Upload wheel as CI artifact
      # -----------------------------------------------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Publish: collect all wheels and push to PyPI
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-22.04
    # Only publish on tag push (or manual trigger with publish=true)
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.publish == 'true'

    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      # Uses PyPI Trusted Publishing — no API token needed.
      # Set up at: https://pypi.org/manage/account/publishing/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # ignore files already on PyPI (e.g. from a partial prior run)
